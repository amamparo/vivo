name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/check

  tag:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: .github/scripts/resolve-version.sh "${{ github.event.inputs.version }}"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

  build:
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Stamp version
        run: .github/scripts/stamp-version.sh "${{ needs.tag.outputs.new_version }}"

      - run: cd ui && npm ci
      - run: cd ui && npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          tagName: ${{ needs.tag.outputs.new_tag }}
          releaseName: "Vivo ${{ needs.tag.outputs.new_tag }}"
          releaseBody: "See the [commit log](https://github.com/${{ github.repository }}/commits/${{ needs.tag.outputs.new_tag }}) for changes."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
